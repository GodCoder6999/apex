# One-click shared backend on Render: a free Postgres + the Node API.
# Render → New + → Blueprint → pick this repo → Apply. Then copy the API URL.
databases:
  - name: snd-db
    plan: free

services:
  - type: web
    name: snd-shared-api
    runtime: node
    plan: free
    rootDir: server-node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snd-db
          property: connectionString
