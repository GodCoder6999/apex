# Render Blueprint for the whole S&D suite (one repo).
# Render → Blueprints → s&d → Manual sync  (reads THIS file at repo root).
#
# Creates:
#   - snd-data          free Postgres (shared data)
#   - snd-api           Node API (catalog, orders, enquiries)  <-- the wire
#   - apex-owner-web    owner dashboard (static)   -> talks to the API
#   - snd-shop          customer storefront (static) -> talks to the API
databases:
  - name: snd-data
    plan: free

services:
  # ---- shared backend (wires all apps) ----
  - type: web
    name: snd-api
    runtime: node
    plan: free
    rootDir: server-node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snd-data
          property: connectionString

  # ---- owner dashboard (static) ----
  - type: web
    name: apex-owner-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: snd-api
          type: web
          property: host

  # ---- customer storefront (static, distinct theme) ----
  - type: web
    name: snd-shop
    runtime: static
    rootDir: store
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: snd-api
          type: web
          property: host
