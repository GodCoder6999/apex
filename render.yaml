# Render Static Sites. The shared Node API (snd-shared-api) and its Postgres
# (snd-db) already exist as standalone services and are managed outside this
# blueprint, so they are NOT defined here (avoids duplicate-create on sync).
#
# Both sites bake VITE_API_BASE at build time -> they read the live shared
# catalog and push customer orders as enquiries.
services:
  # ---- owner dashboard (static) ----
  - type: web
    name: apex-owner-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE
        value: https://snd-shared-api.onrender.com

  # ---- customer storefront (static, distinct theme) ----
  - type: web
    name: snd-shop
    runtime: static
    rootDir: store
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE
        value: https://snd-shared-api.onrender.com
