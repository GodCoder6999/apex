# Render Static Sites only. The shared Node API (snd-shared-api) and its
# Postgres (snd-db) already exist as standalone services and are managed
# outside this blueprint, so they are intentionally NOT defined here (avoids
# duplicate-create errors on sync).
#
# Each static site reads VITE_API_BASE at build time. Set it in the Render
# dashboard (Environment tab) to the snd-shared-api host, then redeploy.
services:
  # ---- owner dashboard (static) ----
  - type: web
    name: apex-owner-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true

  # ---- customer storefront (static, distinct theme) ----
  - type: web
    name: snd-shop
    runtime: static
    rootDir: store
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
